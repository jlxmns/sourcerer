{% load static %}
<header class="student-header">
  <div class="student-header__left">
    <a href="{% url 'dashboard:student_dashboard' %}" class="student-header__logo">
      <div class="student-header__logo-icon">🧙</div>
      <span class="student-header__logo-text">Sourcerer</span>
    </a>
  </div>

  <div class="student-header__xp-section">
    <div class="student-header__xp-labels">
      <span class="student-header__level">Nível {{ student.level }}</span>
      <span class="student-header__xp-num">{{ student.mana }} / 1500 XP</span>
    </div>
    <div class="student-header__xp-bar">
      <div class="student-header__xp-fill" style="width:{% widthratio student.mana 1500 100 %}%"></div>
    </div>
  </div>

  <div class="student-header__mana">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
    <span class="student-header__mana-value">{{ student.mana }}</span>
    <span class="student-header__mana-label">mana</span>
  </div>

  <div class="student-header__badges">
    {% for ub in equipped_badges %}
      <div class="student-header__badge" title="{{ ub.badge.name }}">
        {% if ub.badge.image %}
          <img src="{{ ub.badge.image.url }}" alt="{{ ub.badge.name }}">
        {% else %}
          {{ ub.badge.name|first }}
        {% endif %}
      </div>
    {% endfor %}
  </div>

  <div class="student-header__actions">
    <button class="student-header__bell"
            hx-get="{% url 'notifications:list' %}"
            hx-target="#notification-dropdown"
            hx-swap="innerHTML"
            onclick="this.nextElementSibling.classList.toggle('notification-dropdown--open')"
            aria-label="Notificações">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
      {% if unread_count > 0 %}
        <span class="student-header__bell-dot">{{ unread_count }}</span>
      {% endif %}
    </button>
    <div id="notification-dropdown" class="notification-dropdown"></div>

    <div class="student-header__avatar-wrapper"
         x-data="{ open: false }">
      <button class="student-header__avatar"
              @click="open = !open"
              @keydown.escape="open = false"
              aria-haspopup="true"
              :aria-expanded="open">
        🧙
      </button>
      <div class="student-header__dropdown"
           x-show="open"
           @click.outside="open = false"
           x-transition:enter="dropdown-enter"
           x-transition:leave="dropdown-leave"
           x-cloak>
        <a href="{% url 'students:profile_edit' %}" class="student-header__dropdown-item" @click="open = false">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          Editar Perfil
        </a>
        <a href="{% url 'password_change' %}" class="student-header__dropdown-item" @click="open = false">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="11" width="14" height="10" rx="2"/><circle cx="12" cy="16" r="1.5"/><path d="M8 11V7a4 4 0 1 1 8 0v4"/></svg>
          Alterar Senha
        </a>
        <form method="post" action="{% url 'logout' %}" class="student-header__dropdown-form">
          {% csrf_token %}
          <button type="submit" class="student-header__dropdown-item student-header__dropdown-item--danger" @click="open = false">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            Sair
          </button>
        </form>
      </div>
    </div>
  </div>
</header>
