<header class="teacher-top-header">
  <div class="teacher-top-header__left">
    <h1 class="teacher-top-header__title">Dashboard</h1>
    {% if teacher.school %}
      <p class="teacher-top-header__subtitle">{{ teacher.school }}</p>
    {% endif %}
  </div>

  <div class="teacher-top-header__right">
    <div class="teacher-top-header__user"
         x-data="{ open: false }">
      <button class="teacher-top-header__user-btn"
              @click="open = !open"
              @keydown.escape="open = false"
              aria-haspopup="true"
              :aria-expanded="open">
        <span class="teacher-top-header__user-avatar">{{ teacher.user.get_full_name|first|default:teacher.user.username|first }}</span>
        <span class="teacher-top-header__user-name">{{ teacher.user.get_full_name|default:teacher.user.username }}</span>
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
      <div class="teacher-dropdown"
           x-show="open"
           @click.outside="open = false"
           x-transition:enter="dropdown-enter"
           x-transition:leave="dropdown-leave"
           x-cloak>
        <a href="{% url 'students:profile_edit' %}" class="teacher-dropdown__item" @click="open = false">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          Editar Perfil
        </a>
        <a href="{% url 'password_change' %}" class="teacher-dropdown__item" @click="open = false">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="11" width="14" height="10" rx="2"/><circle cx="12" cy="16" r="1.5"/><path d="M8 11V7a4 4 0 1 1 8 0v4"/></svg>
          Alterar Senha
        </a>
        <form method="post" action="{% url 'logout' %}">
          {% csrf_token %}
          <button type="submit" class="teacher-dropdown__item teacher-dropdown__item--danger" @click="open = false">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            Sair
          </button>
        </form>
      </div>
    </div>
  </div>
</header>
