<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Módulos — Sourcerer</title>
</head>
<body>
    <h1>Grimório de Aprendizagem</h1>

    {% if modules %}
        <ul>
            {% for module in modules %}
                <li>
                    <h2>
                        <a href="{% url 'module_detail' module.slug %}">
                            {{ module.title }}
                        </a>
                    </h2>
                    <p><strong>Pilar:</strong> {{ module.get_pillar_display }}</p>
                    <p>{{ module.description }}</p>
                </li>
            {% endfor %}
        </ul>
    {% else %}
        <p>Nenhum módulo disponível ainda.</p>
    {% endif %}

    <a href="{% url 'dashboard' %}">Voltar ao dashboard</a>
</body>
</html>
